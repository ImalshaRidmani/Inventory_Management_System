<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | Inventory Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4361ee;
      --primary-dark: #3a56d4;
      --secondary: #7209b7;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --light-gray: #e9ecef;
      --success: #4cc9f0;
      --danger: #f72585;
      --warning: #ff9e00;
      --info: #4895ef;
      --border-radius: 12px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #f5f7fa;
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: white;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      border-right: 1px solid var(--light-gray);
      display: flex;
      flex-direction: column;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .sidebar-header {
      padding: 25px 20px;
      border-bottom: 1px solid var(--light-gray);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-header i {
      font-size: 28px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      /* -webkit-background-clip: text; */
      -webkit-text-fill-color: transparent;
    }

    .sidebar-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 25px;
      text-decoration: none;
      color: var(--gray);
      font-weight: 500;
      transition: var(--transition);
      border-left: 4px solid transparent;
      margin: 2px 0;
    }

    .nav-item:hover {
      background: rgba(67, 97, 238, 0.05);
      color: var(--primary);
      border-left-color: var(--primary);
    }

    .nav-item.active {
      background: rgba(67, 97, 238, 0.1);
      color: var(--primary);
      border-left-color: var(--primary);
      font-weight: 600;
    }

    .nav-item i {
      font-size: 18px;
      width: 24px;
    }

    /* MAIN CONTENT */
    .main {
      margin-left: 260px;
      flex: 1;
      padding: 25px;
      transition: var(--transition);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .page-title h1 {
      font-size: 28px;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .page-title p {
      color: var(--gray);
      font-size: 14px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search-box {
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }

    .search-box input {
      padding: 12px 15px 12px 45px;
      border: 1px solid var(--light-gray);
      border-radius: var(--border-radius);
      width: 280px;
      font-size: 14px;
      transition: var(--transition);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: var(--border-radius);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(to right, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(67, 97, 238, 0.4);
    }

    .btn-warning {
      background: linear-gradient(to right, var(--warning), #e68a00);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(to right, var(--danger), #e71e6e);
      color: white;
    }

    .btn-success {
      background: linear-gradient(to right, #2ecc71, #27ae60);
      color: white;
    }

    /* VIEW TOGGLE */
    .view-toggle {
      display: flex;
      background: white;
      border-radius: var(--border-radius);
      padding: 5px;
      margin-bottom: 25px;
      width: fit-content;
      border: 1px solid var(--light-gray);
    }

    .view-toggle button {
      padding: 10px 20px;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      color: var(--gray);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .view-toggle button.active {
      background: var(--primary);
      color: white;
    }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .product-card {
      background: white;
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 1px solid var(--light-gray);
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    }

    .product-image {
      height: 160px;
      background: linear-gradient(135deg, #f5f7fa, #e4e8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: var(--primary);
      position: relative;
    }

    .product-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }

    .product-badge.in-stock {
      background: var(--success);
    }

    .product-badge.low-stock {
      background: var(--warning);
    }

    .product-badge.out-of-stock {
      background: var(--danger);
    }

    .product-info {
      padding: 20px;
    }

    .product-info h3 {
      font-size: 18px;
      color: var(--dark);
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .product-category {
      color: var(--primary);
      background: rgba(67, 97, 238, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .product-price {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
    }

    .product-stats {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 12px;
      color: var(--gray);
    }

    .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .product-actions {
      display: flex;
      gap: 10px;
    }

    .product-actions .btn {
      flex: 1;
      justify-content: center;
      padding: 10px;
      font-size: 13px;
    }

    /* TABLE VIEW */
    .table-container {
      background: white;
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 40px;
      display: none;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--light-gray);
    }

    .table-header h3 {
      font-size: 18px;
      color: var(--dark);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f8f9fa;
    }

    th {
      padding: 18px 15px;
      text-align: left;
      font-weight: 600;
      color: var(--dark);
      border-bottom: 1px solid var(--light-gray);
      font-size: 14px;
    }

    td {
      padding: 18px 15px;
      border-bottom: 1px solid var(--light-gray);
      color: var(--dark);
      font-size: 14px;
    }

    tbody tr {
      transition: var(--transition);
    }

    tbody tr:hover {
      background: rgba(67, 97, 238, 0.03);
    }

    .stock-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .stock-indicator.high {
      background: var(--success);
      box-shadow: 0 0 0 2px rgba(76, 201, 240, 0.2);
    }

    .stock-indicator.medium {
      background: var(--warning);
      box-shadow: 0 0 0 2px rgba(255, 158, 0, 0.2);
    }

    .stock-indicator.low {
      background: var(--danger);
      box-shadow: 0 0 0 2px rgba(247, 37, 133, 0.2);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-in-stock {
      background: rgba(76, 201, 240, 0.1);
      color: var(--success);
    }

    .status-low-stock {
      background: rgba(255, 158, 0, 0.1);
      color: var(--warning);
    }

    .status-out-of-stock {
      background: rgba(247, 37, 133, 0.1);
      color: var(--danger);
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .action-buttons button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .action-buttons .btn-edit {
      background: rgba(76, 201, 240, 0.1);
      color: var(--success);
    }

    .action-buttons .btn-edit:hover {
      background: var(--success);
      color: white;
    }

    .action-buttons .btn-delete {
      background: rgba(247, 37, 133, 0.1);
      color: var(--danger);
    }

    .action-buttons .btn-delete:hover {
      background: var(--danger);
      color: white;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: white;
      border-radius: var(--border-radius);
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
      overflow: hidden;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      padding: 25px;
      border-bottom: 1px solid var(--light-gray);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 22px;
      color: var(--dark);
    }

    .close {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--gray);
      cursor: pointer;
      transition: var(--transition);
    }

    .close:hover {
      color: var(--danger);
    }

    .modal-body {
      padding: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--dark);
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--light-gray);
      border-radius: var(--border-radius);
      font-size: 15px;
      transition: var(--transition);
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .modal-footer {
      padding: 20px 25px;
      border-top: 1px solid var(--light-gray);
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
    }

    .pagination button {
      width: 40px;
      height: 40px;
      border: 1px solid var(--light-gray);
      background: white;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--dark);
    }

    .pagination button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .pagination button.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
      }
      
      .sidebar-header h2,
      .nav-item span {
        display: none;
      }
      
      .main {
        margin-left: 70px;
      }
      
      .topbar {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }
      
      .search-box input {
        width: 100%;
      }
      
      .form-row {
        grid-template-columns: 1fr;
      }
      
      table {
        display: block;
        overflow-x: auto;
      }
    }

    @media (max-width: 576px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
      
      .main {
        padding: 15px;
      }
      
      .modal-content {
        margin: 20px;
        width: calc(100% - 40px);
      }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <i class="fas fa-boxes"></i>
    <h2>Inventory Pro</h2>
  </div>
  
  <div class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Dashboard</span>
    </a>
    <a href="product.html" class="nav-item active">
      <i class="fas fa-box"></i>
      <span>Products</span>
    </a>
    <a href="stock.html" class="nav-item">
      <i class="fas fa-warehouse"></i>
      <span>Stock</span>
    </a>
    <a href="users.html" class="nav-item">
      <i class="fas fa-users"></i>
      <span>Users</span>
    </a>
    <a href="roles.html" class="nav-item">
      <i class="fas fa-user-tag"></i>
      <span>Roles</span>
    </a>
    <a href="reports.html" class="nav-item">
      <i class="fas fa-chart-bar"></i>
      <span>Reports</span>
    </a>
    <a href="settings.html" class="nav-item">
      <i class="fas fa-cog"></i>
      <span>Settings</span>
    </a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title">
      <h1>Products</h1>
      <p>Manage your inventory products and stock levels</p>
    </div>
    
    <div class="actions">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>
      
      <button class="btn btn-primary" onclick="openModal()">
        <i class="fas fa-plus"></i>
        Add Product
      </button>
    </div>
  </div>

  <div class="view-toggle">
    <button class="active" onclick="switchView('grid')">
      <i class="fas fa-th-large"></i>
      Grid
    </button>
    <button onclick="switchView('table')">
      <i class="fas fa-table"></i>
      Table
    </button>
  </div>

  <!-- Grid View -->
  <div class="product-grid" id="gridView">
    <!-- Products will be added here by JavaScript -->
  </div>

  <!-- Table View -->
  <div class="table-container" id="tableView">
    <div class="table-header">
      <h3>All Products</h3>
      <button class="btn btn-primary" onclick="openModal()">
        <i class="fas fa-plus"></i>
        Add New
      </button>
    </div>
    
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Category</th>
            <th>Stock</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productTableBody">
          <!-- Table rows will be added by JavaScript -->
        </tbody>
      </table>
    </div>
    
    <div class="pagination" id="pagination">
      <!-- Pagination will be added here -->
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Add New Product</h2>
      <button class="close" onclick="closeModal()">&times;</button>
    </div>
    
    <div class="modal-body">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="productName" placeholder="Enter product name">
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="productCategory">
            <option value="">Select category</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Home">Home & Kitchen</option>
            <option value="Books">Books</option>
            <option value="Other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" id="productPrice" placeholder="0.00" step="0.01">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="productQuantity" placeholder="0">
        </div>
        
        <div class="form-group">
          <label>Min Stock Threshold</label>
          <input type="number" id="minStockThreshold" placeholder="Min stock alert level" value="10">
        </div>
      </div>
      
      <div class="form-group">
        <label>Description</label>
        <textarea id="productDescription" rows="3" placeholder="Enter product description"></textarea>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script>
  // Product Data
  let products = [
    { id: 1, name: "iPhone 13 Pro", category: "Electronics", quantity: 25, price: 999.99, minThreshold: 10, description: "Latest iPhone with Pro camera system" },
    { id: 2, name: "Samsung Galaxy S22", category: "Electronics", quantity: 8, price: 799.99, minThreshold: 15, description: "Android flagship with amazing camera" },
    { id: 3, name: "Nike Air Max", category: "Clothing", quantity: 42, price: 129.99, minThreshold: 20, description: "Comfortable running shoes" },
    { id: 4, name: "MacBook Pro 14\"", category: "Electronics", quantity: 5, price: 1999.99, minThreshold: 8, description: "Professional laptop for creators" },
    { id: 5, name: "Coffee Maker", category: "Home", quantity: 0, price: 89.99, minThreshold: 5, description: "Automatic drip coffee maker" },
    { id: 6, name: "Wireless Headphones", category: "Electronics", quantity: 35, price: 199.99, minThreshold: 15, description: "Noise cancelling headphones" },
    { id: 7, name: "Office Chair", category: "Home", quantity: 12, price: 299.99, minThreshold: 10, description: "Ergonomic office chair" },
    { id: 8, name: "Gaming Mouse", category: "Electronics", quantity: 3, price: 49.99, minThreshold: 12, description: "RGB gaming mouse" }
  ];

  let editIndex = -1;
  let currentView = 'grid';
  let currentPage = 1;
  const itemsPerPage = 5;

  // Helper function to determine stock status based on quantity and threshold
  function getStockStatus(quantity, minThreshold) {
    if (quantity <= 0) return { status: 'Out of Stock', class: 'out-of-stock', badgeClass: 'status-out-of-stock', indicator: 'low' };
    if (quantity < minThreshold) return { status: 'Low Stock', class: 'low-stock', badgeClass: 'status-low-stock', indicator: 'medium' };
    return { status: 'In Stock', class: 'in-stock', badgeClass: 'status-in-stock', indicator: 'high' };
  }

  // Update product status based on quantity
  function updateProductStatus(product) {
    const statusInfo = getStockStatus(product.quantity, product.minThreshold);
    product.status = statusInfo.status;
    return statusInfo;
  }

  // Get status badge HTML for table
  function getStatusBadgeHTML(quantity, minThreshold) {
    const statusInfo = getStockStatus(quantity, minThreshold);
    return `
      <span class="status-badge ${statusInfo.badgeClass}">
        <span class="stock-indicator ${statusInfo.indicator}"></span>
        ${statusInfo.status}
      </span>
    `;
  }

  // Get stock indicator for table
  function getStockIndicatorHTML(quantity, minThreshold) {
    const statusInfo = getStockStatus(quantity, minThreshold);
    let indicatorClass = 'high';
    if (quantity <= 0) indicatorClass = 'low';
    else if (quantity < minThreshold) indicatorClass = 'medium';
    
    return `
      <span class="stock-indicator ${indicatorClass}"></span>
      ${quantity}
    `;
  }

  // Switch between grid and table view
  function switchView(view) {
    currentView = view;
    const gridView = document.getElementById('gridView');
    const tableView = document.getElementById('tableView');
    const buttons = document.querySelectorAll('.view-toggle button');
    
    buttons.forEach(btn => btn.classList.remove('active'));
    if (view === 'grid') {
      buttons[0].classList.add('active');
      gridView.style.display = 'grid';
      tableView.style.display = 'none';
    } else {
      buttons[1].classList.add('active');
      gridView.style.display = 'none';
      tableView.style.display = 'block';
    }
    
    renderProducts();
  }

  // Open modal for add/edit
  function openModal(index = -1) {
    editIndex = index;
    const modal = document.getElementById('productModal');
    const title = document.getElementById('modalTitle');
    
    if (index >= 0) {
      title.textContent = 'Edit Product';
      const product = products[index];
      document.getElementById('productName').value = product.name;
      document.getElementById('productCategory').value = product.category;
      document.getElementById('productPrice').value = product.price;
      document.getElementById('productQuantity').value = product.quantity;
      document.getElementById('minStockThreshold').value = product.minThreshold || 10;
      document.getElementById('productDescription').value = product.description || '';
    } else {
      title.textContent = 'Add New Product';
      clearModal();
    }
    
    modal.style.display = 'flex';
  }

  // Close modal
  function closeModal() {
    document.getElementById('productModal').style.display = 'none';
    editIndex = -1;
  }

  // Clear modal form
  function clearModal() {
    document.getElementById('productName').value = '';
    document.getElementById('productCategory').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productQuantity').value = '';
    document.getElementById('minStockThreshold').value = '10';
    document.getElementById('productDescription').value = '';
  }

  // Save product (add or edit)
  function saveProduct() {
    const name = document.getElementById('productName').value.trim();
    const category = document.getElementById('productCategory').value.trim();
    const price = parseFloat(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQuantity').value);
    const minThreshold = parseInt(document.getElementById('minStockThreshold').value);
    const description = document.getElementById('productDescription').value.trim();

    if (!name || !category || isNaN(price) || isNaN(quantity)) {
      showNotification("Please fill in all required fields correctly!", "danger");
      return;
    }

    if (price < 0 || quantity < 0) {
      showNotification("Price and quantity cannot be negative!", "danger");
      return;
    }

    const product = {
      id: editIndex >= 0 ? products[editIndex].id : Math.max(...products.map(p => p.id), 0) + 1,
      name,
      category,
      price,
      quantity,
      minThreshold: minThreshold || 10,
      description
    };

    // Update status based on quantity and threshold
    updateProductStatus(product);

    if (editIndex >= 0) {
      products[editIndex] = product;
      showNotification('Product updated successfully!', 'success');
    } else {
      products.push(product);
      showNotification('Product added successfully!', 'success');
    }

    renderProducts();
    closeModal();
  }

  // Delete product
  function deleteProduct(index) {
    if (confirm("Are you sure you want to delete this product?")) {
      products.splice(index, 1);
      renderProducts();
      showNotification('Product deleted successfully!', 'success');
    }
  }

  // Render all products (both views)
  function renderProducts() {
    renderGridView();
    renderTableView();
    renderPagination();
  }

  // Render grid view
  function renderGridView() {
    const gridView = document.getElementById('gridView');
    gridView.innerHTML = '';

    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    let filteredProducts = products;
    
    if (searchTerm) {
      filteredProducts = products.filter(product => 
        product.name.toLowerCase().includes(searchTerm) ||
        product.category.toLowerCase().includes(searchTerm)
      );
    }

    if (filteredProducts.length === 0) {
      gridView.innerHTML = `
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; background: white; border-radius: var(--border-radius);">
          <i class="fas fa-box-open" style="font-size: 48px; color: var(--gray); margin-bottom: 15px; display: block;"></i>
          <p style="color: var(--gray);">No products found</p>
        </div>
      `;
      return;
    }

    filteredProducts.forEach((product, idx) => {
      const originalIndex = products.findIndex(p => p.id === product.id);
      const statusInfo = getStockStatus(product.quantity, product.minThreshold);
      
      const productCard = document.createElement('div');
      productCard.className = 'product-card';
      productCard.innerHTML = `
        <div class="product-image">
          <i class="fas fa-box"></i>
          <div class="product-badge ${statusInfo.class}">${statusInfo.status}</div>
        </div>
        <div class="product-info">
          <h3>${product.name}</h3>
          <div class="product-meta">
            <span class="product-category">${product.category}</span>
            <div class="product-price">$${product.price.toFixed(2)}</div>
          </div>
          <div class="product-stats">
            <div class="stat">
              <div class="stat-label">Quantity</div>
              <div class="stat-value">${product.quantity}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Min Required</div>
              <div class="stat-value">${product.minThreshold}</div>
            </div>
          </div>
          <div class="product-actions">
            <button class="btn btn-warning" onclick="openModal(${originalIndex})">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button class="btn btn-danger" onclick="deleteProduct(${originalIndex})">
              <i class="fas fa-trash"></i> Delete
            </button>
          </div>
        </div>
      `;
      
      gridView.appendChild(productCard);
    });
  }

  // Render table view with pagination
  function renderTableView() {
    const tbody = document.getElementById('productTableBody');
    tbody.innerHTML = '';

    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    let filteredProducts = products;
    
    if (searchTerm) {
      filteredProducts = products.filter(product => 
        product.name.toLowerCase().includes(searchTerm) ||
        product.category.toLowerCase().includes(searchTerm)
      );
    }

    if (filteredProducts.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="7" style="text-align: center; padding: 50px;">
            <i class="fas fa-box-open" style="font-size: 48px; color: var(--gray); margin-bottom: 15px; display: block;"></i>
            <p style="color: var(--gray);">No products found</p>
          </td>
        </tr>
      `;
      return;
    }

    // Pagination
    const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
    const startIndex = (currentPage - 1) * itemsPerPage;
    const paginatedProducts = filteredProducts.slice(startIndex, startIndex + itemsPerPage);

    paginatedProducts.forEach((product) => {
      const originalIndex = products.findIndex(p => p.id === product.id);
      const statusInfo = getStockStatus(product.quantity, product.minThreshold);
      
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${product.id}</td>
        <td>
          <strong>${product.name}</strong>
          <div style="font-size: 12px; color: var(--gray); margin-top: 3px;">${product.description?.substring(0, 40) || 'No description'}...</div>
        </td>
        <td>${product.category}</td>
        <td>
          <span class="stock-indicator ${statusInfo.indicator}"></span>
          ${product.quantity}
          ${product.quantity < product.minThreshold ? `<span style="font-size: 11px; color: var(--warning); margin-left: 5px;">(Below ${product.minThreshold})</span>` : ''}
        </td>
        <td><strong>$${product.price.toFixed(2)}</strong></td>
        <td>
          ${getStatusBadgeHTML(product.quantity, product.minThreshold)}
        </td>
        <td>
          <div class="action-buttons">
            <button class="btn-edit" onclick="openModal(${originalIndex})" title="Edit">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn-delete" onclick="deleteProduct(${originalIndex})" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </td>
      `;
      
      tbody.appendChild(row);
    });

    // Store total pages for pagination
    window.currentTotalPages = totalPages;
  }

  // Render pagination
  function renderPagination() {
    const paginationDiv = document.getElementById('pagination');
    if (!paginationDiv) return;
    
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    let filteredProducts = products;
    
    if (searchTerm) {
      filteredProducts = products.filter(product => 
        product.name.toLowerCase().includes(searchTerm) ||
        product.category.toLowerCase().includes(searchTerm)
      );
    }
    
    const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
    
    if (totalPages <= 1) {
      paginationDiv.innerHTML = '';
      return;
    }
    
    paginationDiv.innerHTML = '';
    
    // Previous button
    const prevBtn = document.createElement('button');
    prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => {
      if (currentPage > 1) {
        currentPage--;
        renderTableView();
        renderPagination();
      }
    };
    paginationDiv.appendChild(prevBtn);
    
    // Page buttons
    for (let i = 1; i <= totalPages; i++) {
      const pageBtn = document.createElement('button');
      pageBtn.textContent = i;
      pageBtn.className = currentPage === i ? 'active' : '';
      pageBtn.onclick = () => {
        currentPage = i;
        renderTableView();
        renderPagination();
      };
      paginationDiv.appendChild(pageBtn);
    }
    
    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderTableView();
        renderPagination();
      }
    };
    paginationDiv.appendChild(nextBtn);
  }

  // Show notification
  function showNotification(message, type = 'success') {
    const notification = document.createElement('div');
    notification.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      background: ${type === 'success' ? '#2ecc71' : type === 'danger' ? '#f72585' : '#ff9e00'};
      color: white;
      padding: 15px 20px;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideInRight 0.3s ease;
    `;
    
    notification.innerHTML = `
      <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'}"></i>
      <span>${message}</span>
    `;
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
      notification.style.animation = 'slideOutRight 0.3s ease';
      setTimeout(() => {
        document.body.removeChild(notification);
      }, 300);
    }, 3000);
  }

  // Add animation styles
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
  `;
  document.head.appendChild(style);

  // Search functionality
  document.getElementById('searchInput').addEventListener('input', function() {
    currentPage = 1;
    renderProducts();
  });

  // Initialize
  document.addEventListener('DOMContentLoaded', function() {
    // Update status for all products on load
    products.forEach(product => updateProductStatus(product));
    renderProducts();
    
    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('productModal');
      if (event.target === modal) {
        closeModal();
      }
    };
  });
</script>

</body>
</html>
